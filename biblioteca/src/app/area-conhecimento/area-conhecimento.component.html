<body class="bg-slate-100 text-slate-800 antialiased">
  <div class="flex min-h-screen">

    <!-- CONTEÚDO -->
    <main class="flex-1 p-8">
      <header class="mb-8">
        <h2 class="text-4xl font-bold text-slate-800">Áreas de Conhecimento</h2>
        <p class="text-slate-500 mt-2">Gerencie categorias e áreas de livros da biblioteca.</p>
      </header>

      <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 max-w-4xl">
        <div class="flex items-center gap-4 mb-8">
          <div class="bg-purple-100 text-purple-600 p-4 rounded-2xl text-3xl">🧠</div>
          <div>
            <h2 class="text-2xl font-bold text-slate-700">Nova Área</h2>
            <p class="text-slate-400 text-sm mt-1">
              Cadastre novas categorias de livros para organização da biblioteca.
            </p>
          </div>
        </div>

        <div class="flex flex-col lg:flex-row gap-4">
          <div class="flex-1">
            <label class="block text-sm font-semibold text-slate-600 mb-2">Nome da Área</label>
            <input
              [(ngModel)]="nomeArea"
              type="text"
              placeholder="Ex: Exatas, Filosofia, Biológicas..."
              class="w-full border border-slate-200 rounded-xl px-4 py-4 outline-none focus:ring-2 focus:ring-[#243e58] transition"
            />
          </div>
        </div>

        <div class="flex flex-col md:flex-row gap-4 mt-8">
          <button
            type="button"
            (click)="salvarArea()"
            [disabled]="loading"
            class="flex-1 bg-[#243e58] hover:bg-[#334155] disabled:opacity-50 text-white font-semibold py-4 rounded-xl transition-all duration-200 shadow-md hover:shadow-lg"
          >
            {{ loading ? 'Salvando...' : '💾 Salvar Área' }}
          </button>

          <button
            type="button"
            (click)="nomeArea = ''"
            class="bg-slate-200 hover:bg-slate-300 text-slate-700 font-semibold px-6 py-4 rounded-xl transition-all"
          >
            Limpar
          </button>
        </div>

        <div
          *ngIf="msg"
          [class]="msgClasse"
          class="mt-6 text-sm font-medium min-h-[20px] transition-all duration-200"
        >
          {{ msg }}
        </div>
      </section>

      <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 max-w-4xl mt-6">
        <div class="flex items-center justify-between flex-wrap gap-4">
          <div>
            <h3 class="text-lg font-bold text-slate-700">📚 Organização Inteligente</h3>
            <p class="text-slate-400 text-sm mt-1">
              Categorize os livros corretamente para melhorar pesquisas e filtros.
            </p>
          </div>
          <div class="bg-slate-100 px-5 py-3 rounded-xl text-slate-600 font-medium">
            Sistema Ativo ✅
          </div>
        </div>
      </section>
    </main>
  </div>
</body>
