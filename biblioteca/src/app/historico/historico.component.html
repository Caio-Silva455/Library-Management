<body class="bg-slate-100 text-slate-800 antialiased min-h-screen">
  <div class="flex min-h-screen">

    <main class="flex-1 p-4 md:p-8 overflow-y-auto">
      <header class="mb-8">
        <h2 class="text-3xl md:text-4xl font-bold text-slate-800 tracking-tight">Histórico de Empréstimos</h2>
        <p class="text-slate-500 mt-2 text-sm md:text-base">
          Monitore devoluções, atrasos, livros perdidos e a situação de multas pendentes no sistema.
        </p>
      </header>

      <section class="bg-white rounded-2xl shadow-sm border border-slate-200/80 p-5 md:p-6 mb-8" aria-label="Filtros de busca">
        <div class="flex flex-col md:flex-row gap-4 items-end">
          
          <div class="w-full flex-1">
            <label for="input-busca-historico" class="text-xs font-bold uppercase text-slate-400 block mb-2 tracking-wider">
              Filtrar por Aluno ou Livro
            </label>
            <div class="relative">
              <input
                type="text"
                id="input-busca-historico"
                placeholder="Digite o nome do aluno ou título do livro..."
                class="w-full border border-slate-200 rounded-xl pl-4 pr-10 py-3 outline-none transition-all focus:border-slate-400 focus:ring-4 focus:ring-slate-100 placeholder:text-slate-400 text-sm md:text-base bg-slate-50/50 focus:bg-white"
              />
            </div>
          </div>
          
          <div class="w-full md:w-auto flex gap-3 shrink-0">
            <button
              (click)="carregarHistorico()"
              class="flex-1 md:flex-none bg-[#243e58] hover:bg-[#1a2f43] active:scale-[0.98] text-white font-semibold rounded-xl px-6 py-3 transition-all shadow-sm text-sm md:text-base"
            >
              Buscar
            </button>
            <button
              (click)="limparFiltro()"
              aria-label="Limpar filtro"
              class="bg-slate-100 hover:bg-red-50 hover:text-red-600 text-slate-600 font-bold px-4 rounded-xl transition-all border border-slate-200/60 active:scale-[0.98]"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                fill="currentColor"
                class="bi bi-x-lg"
                viewBox="0 0 16 16"
                aria-hidden="true"
              >
                <path d="M2.146 2.854a.5.5 0 1 1 .708-.708L8 7.293l5.146-5.147a.5.5 0 0 1 .708.708L8.707 8l5.147 5.146a.5.5 0 0 1-.708.708L8 8.707l-5.146 5.147a.5.5 0 0 1-.708-.708L7.293 8z" />
              </svg>
            </button>
          </div>

        </div>
      </section>

      <section class="bg-white rounded-2xl shadow-sm border border-slate-200/80 p-4 md:p-6">
        <div
          class="overflow-x-auto rounded-xl border border-slate-100 bg-slate-50/50 min-h-[300px] transition-all"
          id="tabela-historico-container"
          role="region" 
          aria-live="polite"
        >
          <div class="flex flex-col items-center justify-center min-h-[300px] text-slate-400 p-6">
            <svg class="animate-spin h-8 w-8 text-slate-300 mb-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p class="text-sm font-medium text-slate-500">Buscando dados do histórico...</p>
          </div>
        </div>
      </section>

    </main>
  </div>

</body>
